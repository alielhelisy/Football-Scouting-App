{% extends "base.html" %}
{% block title %}Login — Scouting App{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">SIGN IN</div>
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="username">Username or Email</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group checkbox-row">
            <input type="checkbox" id="show_pass" onclick="
                var p = document.getElementById('password');
                p.type = this.checked ? 'text' : 'password';
            ">
            <label for="show_pass">Show Password</label>
        </div>
        <div class="auth-actions">
            <a href="{{ url_for('register') }}" class="link-btn">Create Account</a>
            <div class="auth-buttons">
                <a href="/" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Login</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
