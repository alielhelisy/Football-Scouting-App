{% extends "base.html" %}
{% block title %}Sign In - Scouting App{% endblock %}
{% block body_class %}signin-page{% endblock %}

{% block content %}
<form method="POST" class="signin-card">
    <div class="signin-header">
        <div class="signin-logo">
            <div class="signin-logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                </svg>
            </div>
            <span class="signin-logo-text">Scouting App</span>
        </div>
        <div class="signin-title">Sign In</div>
    </div>

    <div class="signin-body">
        <div class="field">
            <label class="field-label" for="username">Username or Email</label>
            <div class="input-wrap">
                <input type="text" id="username" name="username" placeholder="Enter your username or email" required autofocus>
            </div>
        </div>

        <div class="field">
            <label class="field-label" for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <button class="toggle-pw" onclick="togglePassword()" type="button" id="toggle-btn" aria-label="Toggle password visibility">
                    <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <label class="show-pw-row">
            <input type="checkbox" id="show-pw-check">
            <span class="custom-check">
                <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="2,5 4,7 8,3"/>
                </svg>
            </span>
            <span class="show-pw-label">Show Password</span>
        </label>

        <div class="divider"></div>
    </div>

    <div class="signin-footer">
        <a class="link-create" href="{{ url_for('register') }}">Create Account</a>
        <div class="footer-btns">
            <a class="btn-cancel" href="{{ url_for('login') }}">Cancel</a>
            <button class="btn-login" type="submit">Login</button>
        </div>
    </div>
</form>

<script>
    const pw = document.getElementById('password');
    const showCheck = document.getElementById('show-pw-check');
    const showRow = document.querySelector('.show-pw-row');
    const icon = document.getElementById('eye-icon');

    function setPasswordVisible(visible) {
        pw.type = visible ? 'text' : 'password';
        showCheck.checked = visible;
        showRow.classList.toggle('checked', visible);
        icon.innerHTML = visible
            ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    function togglePassword() {
        setPasswordVisible(pw.type === 'password');
    }

    showCheck.addEventListener('change', () => setPasswordVisible(showCheck.checked));
</script>
{% endblock %}
