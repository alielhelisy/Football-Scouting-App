{% extends "base.html" %}
{% block title %}Edit Player - {{ player.name }}{% endblock %}
{% block body_class %}add-player-page edit-player-page{% endblock %}

{% block content %}
<section class="ap-card">
    <header class="ap-header">
        <div class="ap-header-icon" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </div>
        <h1 class="ap-title">Edit Player</h1>
    </header>

    {% if error %}
    <div class="alert alert-error ap-alert">{{ error }}</div>
    {% endif %}

    <form method="POST" class="ap-form">
        <div class="ap-form-body">
            <section class="ap-section">
                <div class="ap-section-header">
                    <span class="ap-section-label">Player Info</span>
                </div>
                <div class="ap-section-body">
                    <div class="ap-row">
                        <div class="ap-field">
                            <label class="ap-label" for="name">Display Name <span class="ap-required">*</span></label>
                            <input type="text" id="name" name="name" required autofocus value="{{ player.name }}">
                        </div>
                        <div class="ap-field">
                            <label class="ap-label" for="gender">Gender</label>
                            <select id="gender" name="gender">
                                {% for g in gender_options %}
                                <option value="{{ g }}" {% if player.gender == g %}selected{% endif %}>{{ g }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="ap-row">
                        <div class="ap-field">
                            <label class="ap-label" for="position">Main Position</label>
                            <select id="position" name="position">
                                <option value="">&mdash; None &mdash;</option>
                                {% for key, display in positions.items() %}
                                <option value="{{ key }}" {% if player.position == key %}selected{% endif %}>{{ display }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="ap-field">
                            <label class="ap-label" for="other_position">Other Position</label>
                            <select id="other_position" name="other_position">
                                <option value="">&mdash; None &mdash;</option>
                                {% for key, display in positions.items() %}
                                <option value="{{ key }}" {% if player.other_position == key %}selected{% endif %}>{{ display }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <section class="ap-section">
                <div class="ap-section-header">
                    <span class="ap-section-label">Team</span>
                </div>
                <div class="ap-section-body">
                    <div class="ap-field">
                        <label class="ap-label" for="team">Club / Team Name</label>
                        <input type="text" id="team" name="team" value="{{ player.team or '' }}">
                    </div>
                </div>
            </section>

            <section class="ap-section">
                <button type="button" class="ap-section-header ap-toggle-header" onclick="toggleOptional()">
                    <span class="ap-section-label">Optional Fields</span>
                    <span class="ap-toggle-icon open" id="toggle-icon" aria-hidden="true">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </span>
                </button>

                <div class="ap-section-body" id="optional-fields">
                    <div class="ap-row">
                        <div class="ap-field">
                            <label class="ap-label" for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" value="{{ player.first_name or '' }}">
                        </div>
                        <div class="ap-field">
                            <label class="ap-label" for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" value="{{ player.last_name or '' }}">
                        </div>
                    </div>

                    <div class="ap-field">
                        <label class="ap-label" for="nationality">Nationality</label>
                        <input type="text" id="nationality" name="nationality" value="{{ player.nationality or '' }}">
                    </div>

                    <div class="ap-row ap-row-3">
                        <div class="ap-field">
                            <label class="ap-label" for="birthday">Birthday</label>
                            <input type="date" id="birthday" name="birthday" value="{{ (player.birthday or '')[:10] }}">
                        </div>
                        <div class="ap-field">
                            <label class="ap-label" for="height">Height (cm)</label>
                            <input type="number" id="height" name="height" min="100" max="250" value="{{ player.height or '' }}">
                        </div>
                        <div class="ap-field">
                            <label class="ap-label" for="weight">Weight (kg)</label>
                            <input type="number" id="weight" name="weight" min="40" max="150" value="{{ player.weight or '' }}">
                        </div>
                    </div>

                    <div class="ap-field">
                        <label class="ap-label" for="foot">Preferred Foot</label>
                        <select id="foot" name="foot">
                            <option value="">&mdash; Not specified &mdash;</option>
                            {% for f in foot_options %}
                            <option value="{{ f }}" {% if player.foot == f %}selected{% endif %}>{{ f }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </section>
        </div>

        <footer class="ap-footer">
            <a href="{{ url_for('players_by_position', pos_key=player.position) if player.position else url_for('dashboard') }}"
               class="ap-btn-cancel">Cancel</a>
            <button type="submit" class="ap-btn-submit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                Save Changes
            </button>
        </footer>
    </form>
</section>

<script>
function toggleOptional() {
    var el = document.getElementById('optional-fields');
    var icon = document.getElementById('toggle-icon');
    el.classList.toggle('collapsed');
    icon.classList.toggle('open');
}
</script>
{% endblock %}
