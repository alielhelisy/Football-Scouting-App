{% extends "base.html" %}
{% block title %}Create Report - Scouting App{% endblock %}
{% block body_class %}create-report-page{% endblock %}

{% block content %}
<form method="POST" class="form-card create-report-card">
    <div class="form-header">
        <div class="form-title">
            <div class="form-title-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
            </div>
            Create Report
        </div>
    </div>

    <div class="form-body">
        <div class="field">
            <label class="field-label" for="player_id">Player</label>
            <select id="player_id" name="player_id" required>
                <option value="" disabled selected>Select a player</option>
                {% for p in players %}
                <option value="{{ p.id }}">
                    {{ p.name }} ({{ positions.get(p.position, p.position) }}){% if session.get('role') == 'ADMIN' %} - {{ p.scout_name }}{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="field-row">
            <div class="field">
                <label class="field-label" for="rating">Rating</label>
                <select id="rating" name="rating" required>
                    <option value="" disabled selected>Select</option>
                    {% for rating in rating_options %}
                    <option value="{{ rating }}">{{ rating }}{% if rating_descriptions.get(rating) %} - {{ rating_descriptions.get(rating) }}{% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label class="field-label" for="minutes_played">Minutes</label>
                <input type="number" id="minutes_played" name="minutes_played" value="0" min="0" max="120">
            </div>

            <div class="field">
                <label class="field-label" for="goals_scored">Goals</label>
                <input type="number" id="goals_scored" name="goals_scored" value="0" min="0">
            </div>

            <div class="field">
                <label class="field-label" for="received_cards">Cards</label>
                <select id="received_cards" name="received_cards">
                    {% for card in card_options %}
                    <option value="{{ card }}">{{ card }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="field">
            <label class="field-label" for="rated_position">Rated Position</label>
            <select id="rated_position" name="rated_position" required>
                <option value="" disabled selected>Select</option>
                {% for key, display in positions.items() %}
                <option value="{{ key }}">{{ display }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="field">
            <label class="field-label" for="comments">Player Profile Comments</label>
            <textarea id="comments" name="comments"></textarea>
        </div>
    </div>

    <div class="form-footer">
        <a href="{{ url_for('dashboard') }}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-save">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
            Save Report
        </button>
    </div>
</form>
{% endblock %}
